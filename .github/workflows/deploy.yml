name: deploy

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  phase1-infra-and-build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      TF_IN_AUTOMATION: true
      TF_VAR_location: southcentralus
      TF_VAR_project_name: piisentry
      TF_VAR_resource_suffix: ci
      TF_VAR_search_sku: basic
      TF_VAR_fabric_capacity_sku: F2
      TF_VAR_create_foundry_project: true
      TF_VAR_admin_object_id: ${{ secrets.AZURE_ADMIN_OBJECT_ID }}
      TF_VAR_create_fabric_connection: ${{ secrets.AZURE_FABRIC_CONNECTION_TARGET != '' }}
      TF_VAR_fabric_connection_target: ${{ secrets.AZURE_FABRIC_CONNECTION_TARGET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Azure (WIF)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PiiSentry.slnx

      - name: Build
        run: dotnet build PiiSentry.slnx --configuration Release --no-restore

      - name: Verify .NET Format
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform Init (local)
        run: terraform -chdir=infra init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=infra validate

      - name: Terraform Format Check
        run: terraform -chdir=infra fmt -check -recursive

      - name: Terraform Plan
        run: terraform -chdir=infra plan -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform -chdir=infra apply -auto-approve tfplan

      - name: Capture Terraform Outputs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          echo "FOUNDRY_PROJECT_ENDPOINT=$(terraform -chdir=infra output -raw foundry_project_endpoint)" >> "$GITHUB_ENV"
          echo "FABRIC_CONNECTION_ID=$(terraform -chdir=infra output -raw fabric_connection_id || true)" >> "$GITHUB_ENV"

      - name: Create/Verify Foundry Fabric Agent
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          FOUNDRY_AGENT_NAME: piisentry-fabric-agent
          FOUNDRY_AGENT_MODEL: gpt-4o
        run: ./infra/scripts/create-foundry-agent.sh
