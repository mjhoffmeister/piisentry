name: deploy

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  phase0-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Azure (WIF)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PiiSentry.slnx

      - name: Build
        run: dotnet build PiiSentry.slnx --configuration Release --no-restore

      - name: Verify .NET Format
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform Init (local)
        run: terraform -chdir=infra init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=infra validate

      - name: Terraform Format Check
        run: terraform -chdir=infra fmt -check -recursive
